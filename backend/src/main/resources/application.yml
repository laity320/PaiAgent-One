server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/paiagent?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  mvc:
    async:
      request-timeout: 300000

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      table-prefix: pai_
      id-type: auto

paiagent:
  jwt:
    secret: ${JWT_SECRET:paiagent-one-secret-key-change-in-production-2024}
    expiration-hours: 24
  file-storage:
    base-path: ./uploads
    url-prefix: /files
  engine:
    default-timeout-seconds: 120
    node-timeout-seconds: 60
  llm:
    http-connect-timeout-ms: 5000
    http-read-timeout-ms: 120000
    providers:
      openai:
        base-url: ${OPENAI_BASE_URL:https://api.openai.com}
        api-key: ${OPENAI_API_KEY:}
      deepseek:
        base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
        api-key: ${DEEPSEEK_API_KEY:}
      tongyi:
        base-url: ${QWEN_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
        api-key: ${QWEN_API_KEY:}
      zhipu:
        base-url: ${ZHIPU_BASE_URL:https://open.bigmodel.cn/api/paas}
        api-key: ${ZHIPU_API_KEY:}

logging:
  level:
    com.paiagent: DEBUG
